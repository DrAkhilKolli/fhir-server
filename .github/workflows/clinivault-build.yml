# ─────────────────────────────────────────────────────────────────────────────
# ClinicalVault – FHIR Server image build
#
# Triggers
#   • push to main / copilot/* branches  → builds and pushes :sha tag + :latest
#   • push of v* tag                      → also pushes :vX.Y.Z tag
#   • pull_request against main           → build-only (no push), validates Dockerfile
#   • workflow_dispatch                   → manual rebuild of any ref
#
# Outputs
#   ghcr.io/drakhilkolli/clinivault-fhir:<sha>   (always)
#   ghcr.io/drakhilkolli/clinivault-fhir:latest  (main branch only)
#   ghcr.io/drakhilkolli/clinivault-fhir:vX.Y.Z  (on tag push)
#
# After a successful push the integration-test workflow is triggered
# automatically via workflow_dispatch so that smoke tests always use the
# freshly-built images.
# ─────────────────────────────────────────────────────────────────────────────

name: ClinicalVault – Build FHIR image

on:
  push:
    branches:
      - main
      - "copilot/**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_image:
        description: "Push image to GHCR? (false for dry-run)"
        required: false
        default: "true"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/clinivault-fhir

jobs:
  # ── Step 1: Maven build (produces Liberty assembly + schema CLI jar) ─────────
  maven-build:
    name: Maven package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: maven

      # Build only the modules needed for the container image:
      #   fhir-tools / fhir-parent  → shared model + server code
      #   fhir-persistence-schema   → schema CLI jar (baked into image for DB init)
      #   fhir-server-webapp        → WAR + Liberty assembly
      - name: Build fhir-tools
        run: mvn -B -q install -f fhir-tools -Dmaven.test.skip=true

      - name: Build fhir-parent modules
        run: |
          mvn -B -q install -f fhir-parent \
            -Dmaven.test.skip=true \
            -pl fhir-core,fhir-model,fhir-config,fhir-search,fhir-persistence,fhir-smart,fhir-server,fhir-server-spi \
            -am

      - name: Build fhir-persistence-schema CLI
        run: mvn -B -q package -f fhir-persistence-schema -Dmaven.test.skip=true

      - name: Build fhir-server-webapp (Liberty assembly)
        run: mvn -B -q package -f fhir-server-webapp -Dmaven.test.skip=true

      # Cache the build outputs between jobs
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fhir-build-${{ github.sha }}
          # Liberty runtime + WAR + schema CLI
          path: |
            fhir-server-webapp/target/liberty/wlp/
            fhir-server-webapp/target/fhir-server.war
            fhir-persistence-schema/target/fhir-persistence-schema-*-cli.jar
          retention-days: 1

  # ── Step 2: Docker build + push to GHCR ──────────────────────────────────────
  docker-build-push:
    name: Docker build & push
    runs-on: ubuntu-latest
    needs: maven-build
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build-push.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: fhir-build-${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_image != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Step 3: Trigger integration test after successful image push ─────────────
  trigger-integration-test:
    name: Trigger integration smoke test
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      actions: write

    steps:
      - name: Dispatch integration-test workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'clinivault-integration-test.yml',
              ref: 'main',
              inputs: {
                fhir_image_tag: '${{ needs.docker-build-push.outputs.image_tag }}',
                keycloak_image_tag: 'latest'
              }
            })
